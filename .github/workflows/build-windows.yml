name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: ./gradlew jar copyDeps

      - name: Download JavaFX jmods
        run: |
          curl -L https://download2.gluonhq.com/openjfx/21.0.5/openjfx-21.0.5_windows-x64_bin-jmods.zip -o javafx-jmods.zip
          Expand-Archive javafx-jmods.zip -DestinationPath javafx-jmods

      - name: Package EXE with jpackage
        run: |
          jpackage `
            --input build/libs `
            --main-jar RocketClient-0.1.0.jar `
            --main-class com.rocketclient.Main `
            --type exe `
            --name RocketClient `
            --app-version 0.2.0 `
            --module-path javafx-jmods/javafx-jmods-21.0.5 `
            --add-modules javafx.controls,javafx.fxml,javafx.swing `
            --dest build/dist

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: RocketClient-windows
          path: build/dist/*.exe
