name: Build Rocket Client

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: RocketClient-JAR
          path: build/libs/RocketClient-0.1.0.jar

      - name: Upload Windows deps
        uses: actions/upload-artifact@v4
        with:
          name: RocketClient-Windows-deps
          path: build/libs/deps/
